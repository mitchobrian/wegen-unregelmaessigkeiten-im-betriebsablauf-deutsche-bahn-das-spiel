name: Deploy auf GitHub Pages

# Bei jedem Commit auf main neu ausrollen (+ manueller Start möglich).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deploys vermeiden; laufende NICHT abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Konfiguration aus Secrets erzeugen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/build-config.mjs

      - name: JS-Syntax prüfen
        run: |
          for f in src/*.js scripts/*.mjs; do
            echo "check $f"
            node --check "$f"
          done

      - name: Statische Site zusammenstellen
        run: |
          mkdir -p _site
          cp index.html style.css _site/
          cp -r src assets _site/

      - name: Pages konfigurieren
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
